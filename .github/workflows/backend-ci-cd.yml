name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Compilación y Pruebas (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar el entorno de .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restaurar dependencias (NuGet)
      run: dotnet restore

    - name: Compilar el proyecto (Release)
      run: dotnet build --no-restore --configuration Release

    - name: Ejecutar Pruebas Unitarias e Integración
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

  deploy:
    name: Despliegue Automático (CD)
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Notificar a Render para despliegue
      env:
        DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -z "$DEPLOY_URL" ]; then
          echo "Error: El secreto RENDER_DEPLOY_HOOK_URL no está configurado en GitHub."
          exit 1
        fi
        echo "El CI pasó con éxito. Notificando a Render..."
        curl -f -X POST "$DEPLOY_URL"